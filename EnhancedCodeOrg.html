<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid HTML Runner</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 700; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        #drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 3rem 2rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
        }

        #drop-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .browse-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .browse-btn:hover { background: var(--primary-hover); }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>HTML Runner</h1>
        <p>Drop your file to execute in about:blank</p>
        
        <div id="drop-zone">
            <span class="upload-icon">📄</span>
            <div style="margin-bottom: 10px;">Drag & Drop HTML file here</div>
            <div>or</div>
            <button class="browse-btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
        </div>
        
        <input type="file" id="file-input" accept=".html,.htm">
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => e.preventDefault(), false);
        });

        // Toggle highlight class
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        // Handle dropped files
        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        // Handle browsed files
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.name.endsWith('.html') && !file.name.endsWith('.htm')) {
                alert('Please upload an HTML file.');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                // Open about:blank and write content
                const newWin = window.open('about:blank', '_blank');
                newWin.document.open();
                newWin.document.write(content);
                newWin.document.close();
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
